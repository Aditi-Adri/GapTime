<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ScheduleSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f4f5f7;--bg3:#f9fafb;
  --border:#e5e7eb;--border2:#f0f1f4;
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --green:#1D9E75;--green-d:#0F6E56;--red:#E24B4A;
  --r-md:8px;--r-lg:12px;--r-xl:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg3)}
.app{min-height:100%;display:flex;flex-direction:column}
.hdr{background:var(--bg);border-bottom:1px solid var(--border2);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.logo em{color:var(--green);font-style:normal}
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border2);padding:0 20px;overflow-x:auto;flex-shrink:0}
.tab{padding:11px 18px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:color .15s}
.tab.on{color:var(--text);border-bottom-color:var(--green)}
.tab:hover:not(.on){color:var(--text)}
.body{padding:16px 20px;max-width:860px;margin:0 auto;width:100%}
.card{background:var(--bg);border-radius:var(--r-lg);border:1px solid var(--border2);padding:16px 18px;margin-bottom:12px}
.sec{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px}
.lbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
input,select{padding:8px 11px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;width:100%;outline:none}
input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.btn{padding:7px 14px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn.pri{background:var(--green);color:#fff;border-color:var(--green)}
.btn.pri:hover{background:var(--green-d);border-color:var(--green-d)}
.btn.pri:disabled{opacity:.5;cursor:not-allowed}
.btn.red{color:var(--red)}
.btn.red:hover{background:rgba(226,75,74,.08);border-color:rgba(226,75,74,.3)}
.slot{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-md);background:var(--bg2);margin-bottom:5px;font-size:13px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--bg);border-radius:var(--r-xl);border:1px solid var(--border);padding:20px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.pill{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif}
.pill.on{background:var(--green);color:#fff;border-color:var(--green)}
.drop{border:1.5px dashed var(--border);border-radius:var(--r-lg);padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.drop:hover,.drop.dragover{border-color:var(--green);background:rgba(29,158,117,.04)}
.psi{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-md);border:1px solid var(--border2);margin-bottom:7px;cursor:pointer;transition:all .15s}
.psi.on{border-color:var(--green);background:rgba(29,158,117,.06)}
.chk{width:17px;height:17px;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chk.on{background:var(--green);border-color:var(--green)}
.stat{background:var(--bg2);border-radius:var(--r-md);padding:13px 15px}
.stat-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat-val{font-size:21px;font-weight:500;font-family:'Syne',sans-serif}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500}
.free-chip{padding:5px 12px;border-radius:var(--r-md);font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.3);color:var(--green-d)}
.mode-btn{flex:1;padding:8px;border-radius:var(--r-md);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:all .15s;text-align:center}
.mode-btn.on{background:var(--green);color:#fff;border-color:var(--green)}
.pbar{height:20px;background:var(--bg2);border-radius:100px;overflow:hidden;position:relative;margin-bottom:5px}
.warn{padding:10px 13px;border-radius:var(--r-md);background:rgba(226,75,74,.09);color:#993C1D;font-size:13px;margin-top:10px;border:1px solid rgba(226,75,74,.2)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.spin-g{display:inline-block;width:22px;height:22px;border:2.5px solid rgba(29,158,117,.25);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.grid-container{display:grid;grid-template-columns:45px repeat(7,1fr);background:var(--border2);gap:1px;border:1px solid var(--border2);border-radius:var(--r-md);overflow:hidden;user-select:none;max-height:300px;overflow-y:auto}
.grid-hd{background:var(--bg2);padding:6px 0;text-align:center;font-size:11px;font-weight:600;color:var(--text2);position:sticky;top:0;z-index:2}
.grid-time{background:var(--bg);font-size:10px;color:var(--text3);text-align:right;padding-right:4px;border-bottom:1px solid var(--border2)}
.grid-cell{background:var(--bg);height:18px;cursor:crosshair;border-bottom:1px dashed var(--border2);border-right:1px solid var(--border2)}
.grid-cell:hover{background:var(--bg2)}
.grid-cell.on{background:rgba(29,158,117,.15)}
.grid-cell.on-top{border-top:1.5px solid var(--green)}
.grid-cell.on-bot{border-bottom:1.5px solid var(--green)}
.grid-cell.on-l{border-left:1.5px solid var(--green)}
.grid-cell.on-r{border-right:1.5px solid var(--green)}
.img-prev{width:100%;max-height:130px;object-fit:cover;border-radius:var(--r-md);margin-bottom:12px;border:1px solid var(--border)}
.ai-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.25);color:var(--green-d);font-size:11px;font-weight:600;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const COLORS=[
  {bg:'#E24B4A',light:'rgba(226,75,74,.12)',border:'rgba(226,75,74,.35)',dark:'#993C1D'},
  {bg:'#1D9E75',light:'rgba(29,158,117,.12)',border:'rgba(29,158,117,.35)',dark:'#0F6E56'},
  {bg:'#378ADD',light:'rgba(55,138,221,.12)',border:'rgba(55,138,221,.35)',dark:'#185FA5'},
  {bg:'#7F77DD',light:'rgba(127,119,221,.12)',border:'rgba(127,119,221,.35)',dark:'#534AB7'},
  {bg:'#BA7517',light:'rgba(186,117,23,.12)',border:'rgba(186,117,23,.35)',dark:'#854F0B'},
  {bg:'#D4537E',light:'rgba(212,83,126,.12)',border:'rgba(212,83,126,.35)',dark:'#993556'},
];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TIME_OPTS=[];
for(let h=0;h<24;h++)for(let m=0;m<60;m+=30){
  const v=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  const p=h>=12?'PM':'AM',dh=h===0?12:h>12?h-12:h,dm=String(m).padStart(2,'0');
  TIME_OPTS.push({value:v,label:dh+':'+dm+' '+p});
}

const toM=t=>{const[h,m]=t.split(':').map(Number);return h*60+m};
const toT=n=>String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0');
const fmt=t=>{if(!t)return'';const[h,m]=t.split(':').map(Number);const p=h>=12?'PM':'AM',dh=h===0?12:h>12?h-12:h;return dh+':'+String(m||0).padStart(2,'0')+' '+p};
const fmtD=m=>{const h=Math.floor(m/60),r=m%60;if(h===0)return r+'m';return r===0?h+'h':h+'h '+r+'m'};
const ini=n=>n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const uid=()=>Math.random().toString(36).slice(2,9);
const merge=ivs=>{if(!ivs.length)return[];const s=[...ivs].sort((a,b)=>a.s-b.s),r=[Object.assign({},s[0])];for(let i=1;i<s.length;i++){const l=r[r.length-1];if(s[i].s<=l.e)l.e=Math.max(l.e,s[i].e);else r.push(Object.assign({},s[i]))}return r};

function computeFree(people,cfg){
  const{startTime,endTime,selectedDays,excludedSlots}=cfg,out={};
  for(const day of selectedDays){
    const ss=toM(startTime),se=toM(endTime),busy=[];
    for(const p of people)for(const sl of p.schedule)if(sl.day===day)busy.push({s:toM(sl.startTime),e:toM(sl.endTime)});
    for(const ex of excludedSlots)if(ex.day===day||ex.day==='All Days')busy.push({s:toM(ex.startTime),e:toM(ex.endTime)});
    const clipped=busy.map(b=>({s:Math.max(b.s,ss),e:Math.min(b.e,se)})).filter(b=>b.s<b.e);
    const merged=merge(clipped),free=[];let cur=ss;
    for(const bk of merged){if(bk.s>cur)free.push({s:cur,e:bk.s});cur=Math.max(cur,bk.e)}
    if(cur<se)free.push({s:cur,e:se});
    out[day]={free,busy:merged};
  }
  return out;
}

async function extractScheduleFromImage(file){
  const b64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);
  });
  let mt=file.type;
  if(!['image/jpeg','image/png','image/gif','image/webp'].includes(mt))mt='image/jpeg';
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{
        role:'user',
        content:[
          {type:'image',source:{type:'base64',media_type:mt,data:b64}},
          {type:'text',text:'Look at this routine/timetable image. Extract every class or event. Return ONLY a raw JSON array — no markdown, no backticks. Each item: {"day":"Monday","startTime":"09:00","endTime":"11:00","label":"Course Name"}. Use 24-hour HH:MM. Days must be exactly one of: Sunday Monday Tuesday Wednesday Thursday Friday Saturday. If nothing found return [].'}
        ]
      }]
    })
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e&&e.error&&e.error.message||'API error');}
  const data=await resp.json();
  let txt=data.content&&data.content[0]&&data.content[0].text||'';
  txt=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
  const m=txt.match(/\[[\s\S]*\]/);if(m)txt=m[0];
  const slots=JSON.parse(txt);
  if(!Array.isArray(slots))throw new Error('bad_format');
  return slots;
}

function TSelect({value,onChange}){
  return React.createElement('select',{value,onChange:e=>onChange(e.target.value)},
    TIME_OPTS.map(t=>React.createElement('option',{key:t.value,value:t.value},t.label))
  );
}

function PersonCard({person,onRemove,onRemoveSlot,onAddClass}){
  const byDay=DAYS.reduce((a,d)=>{const s=person.schedule.filter(x=>x.day===d);if(s.length)a[d]=s;return a},{});
  return(
    <div className="card" style={{borderLeft:'4px solid '+person.color.bg,paddingLeft:15}}>
      <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:person.schedule.length?12:0}}>
        <div style={{width:38,height:38,borderRadius:'50%',background:person.color.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>{ini(person.name)}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:600,fontSize:15}}>{person.name}</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>{person.schedule.length===0?'No classes yet':person.schedule.length+' class'+(person.schedule.length!==1?'es':'')+' across '+Object.keys(byDay).length+' day'+(Object.keys(byDay).length!==1?'s':'')}</div>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <button className="btn" style={{fontSize:12,padding:'5px 10px'}} onClick={()=>onAddClass('manual')}>✏️ Manual</button>
          <button className="btn" style={{fontSize:12,padding:'5px 10px'}} onClick={()=>onAddClass('image')}>🤖 AI Scan</button>
          <button className="btn" style={{fontSize:12,padding:'5px 10px'}} onClick={()=>onAddClass('grid')}>📅 Grid</button>
          <button className="btn red" style={{fontSize:12,padding:'5px 8px'}} onClick={onRemove}>
            <svg width="12" height="12" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fillRule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
          </button>
        </div>
      </div>
      {Object.entries(byDay).map(function([day,slots]){return(
        <div key={day} style={{marginBottom:8}}>
          <div className="lbl" style={{marginBottom:5}}>{day}</div>
          {slots.map(function(sl,i){
            const ri=person.schedule.indexOf(sl);
            return(
              <div key={i} className="slot">
                <div className="dot" style={{background:person.color.bg}}/>
                <div style={{flex:1}}><span style={{fontWeight:500}}>{fmt(sl.startTime)}</span><span style={{color:'var(--text2)',margin:'0 5px'}}>–</span><span style={{fontWeight:500}}>{fmt(sl.endTime)}</span>{sl.label&&<span style={{color:'var(--text2)',marginLeft:8,fontSize:12}}>· {sl.label}</span>}</div>
                <span style={{fontSize:11,color:'var(--text3)'}}>{fmtD(toM(sl.endTime)-toM(sl.startTime))}</span>
                <button onClick={()=>onRemoveSlot(ri)} style={{border:'none',background:'transparent',color:'var(--text3)',cursor:'pointer',fontSize:16,lineHeight:1,padding:'0 2px'}}>×</button>
              </div>
            );
          })}
        </div>
      );})}
    </div>
  );
}

function ConfigTab({cfg,setCfg,newExcl,setNewExcl}){
  const toggleDay=d=>setCfg(p=>Object.assign({},p,{selectedDays:p.selectedDays.includes(d)?p.selectedDays.filter(x=>x!==d):[...p.selectedDays,d]}));
  const addExcl=()=>{if(toM(newExcl.startTime)>=toM(newExcl.endTime))return;setCfg(p=>Object.assign({},p,{excludedSlots:[...p.excludedSlots,Object.assign({},newExcl,{id:uid()})]}))};
  const remExcl=id=>setCfg(p=>Object.assign({},p,{excludedSlots:p.excludedSlots.filter(e=>e.id!==id)}));
  return(
    <div style={{display:'grid',gap:10}}>
      <div className="card">
        <div className="sec">Search time window</div>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          <div style={{flex:1}}><label className="lbl">From</label><TSelect value={cfg.startTime} onChange={v=>setCfg(p=>Object.assign({},p,{startTime:v}))}/></div>
          <div style={{paddingTop:18,color:'var(--text2)',fontSize:18}}>→</div>
          <div style={{flex:1}}><label className="lbl">To</label><TSelect value={cfg.endTime} onChange={v=>setCfg(p=>Object.assign({},p,{endTime:v}))}/></div>
        </div>
      </div>
      <div className="card">
        <div className="sec">Days to include</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {DAYS.map(d=><button key={d} className={'pill'+(cfg.selectedDays.includes(d)?' on':'')} onClick={()=>toggleDay(d)}>{d.slice(0,3)}</button>)}
        </div>
        {cfg.selectedDays.length===0&&<div style={{fontSize:12,color:'var(--red)',marginTop:8}}>Select at least one day</div>}
      </div>
      <div className="card">
        <div className="sec">Excluded time slots</div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>Block specific times — e.g. lunch, Friday prayer, travel time.</div>
        <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr 1fr auto',gap:8,alignItems:'end',marginBottom:12}}>
          <div><label className="lbl">Day</label><select value={newExcl.day} onChange={e=>setNewExcl(p=>Object.assign({},p,{day:e.target.value}))}><option value="All Days">All Days</option>{DAYS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
          <div><label className="lbl">From</label><TSelect value={newExcl.startTime} onChange={v=>setNewExcl(p=>Object.assign({},p,{startTime:v}))}/></div>
          <div><label className="lbl">To</label><TSelect value={newExcl.endTime} onChange={v=>setNewExcl(p=>Object.assign({},p,{endTime:v}))}/></div>
          <button className="btn pri" onClick={addExcl} style={{padding:'8px 13px',whiteSpace:'nowrap'}}>+ Block</button>
        </div>
        {cfg.excludedSlots.length===0
          ?<div style={{fontSize:13,color:'var(--text3)',fontStyle:'italic'}}>No blocked times yet</div>
          :cfg.excludedSlots.map(ex=>(
            <div key={ex.id} className="slot" style={{background:'rgba(226,75,74,.07)'}}>
              <div className="dot" style={{background:'var(--red)'}}/>
              <div style={{flex:1,fontSize:13}}><strong>{ex.day}</strong> <span style={{color:'var(--text2)'}}>·</span> {fmt(ex.startTime)} – {fmt(ex.endTime)}</div>
              <button onClick={()=>remExcl(ex.id)} style={{border:'none',background:'transparent',color:'var(--red)',cursor:'pointer',fontSize:17,lineHeight:1}}>×</button>
            </div>
          ))
        }
      </div>
    </div>
  );
}

function ResultsTab({people,cfg,results,searching,onSearch,totalFree,totalSearch,daysWithFree}){
  return(
    <div>
      <div className="card" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,marginBottom:12,flexWrap:'wrap'}}>
        <div>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:600,fontSize:14}}>Run free time search</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{cfg.selectedDays.length} day{cfg.selectedDays.length!==1?'s':''} · {fmt(cfg.startTime)}–{fmt(cfg.endTime)} · {people.length} {people.length===1?'person':'people'}{cfg.excludedSlots.length>0?' · '+cfg.excludedSlots.length+' exclusion'+(cfg.excludedSlots.length!==1?'s':''):''}</div>
        </div>
        <button className="btn pri" onClick={onSearch} disabled={searching||!people.length||!cfg.selectedDays.length} style={{padding:'9px 18px'}}>
          {searching?React.createElement(React.Fragment,null,React.createElement('span',{className:'spin'}),' Searching…'):'⚡ Find Free Time'}
        </button>
      </div>
      {results&&!searching&&<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:12}}>
          <div className="stat"><div className="stat-lbl">Total free time</div><div className="stat-val">{fmtD(totalFree)}</div></div>
          <div className="stat"><div className="stat-lbl">Days with free slots</div><div className="stat-val">{daysWithFree}/{cfg.selectedDays.length}</div></div>
          <div className="stat"><div className="stat-lbl">Avg free / day</div><div className="stat-val">{daysWithFree>0?fmtD(Math.round(totalFree/daysWithFree)):'—'}</div></div>
        </div>
        <div style={{display:'grid',gap:10}}>
          {cfg.selectedDays.map(day=>{
            const r=results[day];if(!r)return null;
            const{free,busy}=r,freeMins=free.reduce((s,f)=>s+f.e-f.s,0);
            const pct=Math.round((freeMins/totalSearch)*100);
            const ss=toM(cfg.startTime),se=toM(cfg.endTime),span=se-ss;
            return(
              <div key={day} className="card" style={{marginBottom:0}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:6}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontFamily:'Syne,sans-serif',fontWeight:600,fontSize:15}}>{day}</span>
                    <span style={{fontSize:12,color:'var(--text2)'}}>{free.length===0?'No free slots':fmtD(freeMins)+' free'}</span>
                  </div>
                  {free.length>0
                    ?<span className="badge" style={{background:'rgba(29,158,117,.1)',color:'var(--green-d)'}}>{pct}% free</span>
                    :<span className="badge" style={{background:'rgba(226,75,74,.08)',color:'#993C1D'}}>Fully busy</span>
                  }
                </div>
                <div style={{marginBottom:8}}>
                  {people.map(person=>{
                    const ps=person.schedule.filter(sl=>sl.day===day);
                    return(
                      <div key={person.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                        <div style={{width:20,height:20,borderRadius:'50%',background:person.color.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',flexShrink:0}}>{ini(person.name)}</div>
                        <div style={{flex:1,height:10,background:'var(--bg2)',borderRadius:100,overflow:'hidden',position:'relative'}}>
                          {ps.map((sl,i)=>{const l=((toM(sl.startTime)-ss)/span)*100,w=((toM(sl.endTime)-toM(sl.startTime))/span)*100;return<div key={i} style={{position:'absolute',left:Math.max(0,l)+'%',width:Math.min(100-Math.max(0,l),w)+'%',top:0,bottom:0,background:person.color.bg,opacity:.8}}/>})}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div className="pbar">
                  {free.map((f,i)=><div key={i} style={{position:'absolute',left:((f.s-ss)/span)*100+'%',width:((f.e-f.s)/span)*100+'%',top:0,bottom:0,background:'var(--green)',opacity:.85}}/>)}
                  {busy.map((b,i)=><div key={i} style={{position:'absolute',left:((b.s-ss)/span)*100+'%',width:((b.e-b.s)/span)*100+'%',top:0,bottom:0,background:'rgba(226,75,74,.3)'}}/>)}
                </div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginTop:3,marginBottom:10}}><span>{fmt(cfg.startTime)}</span><span>{fmt(cfg.endTime)}</span></div>
                {free.length>0&&<div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                  {free.map((f,i)=><div key={i} className="free-chip"><svg width="8" height="8" fill="var(--green)" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg>{fmt(toT(f.s))} – {fmt(toT(f.e))}<span style={{color:'var(--green)',opacity:.7,fontSize:11}}>({fmtD(f.e-f.s)})</span></div>)}
                </div>}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:16,alignItems:'center',marginTop:12,padding:'10px 14px',background:'var(--bg2)',borderRadius:'var(--r-md)',fontSize:12,color:'var(--text2)'}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:12,height:12,borderRadius:2,background:'var(--green)'}}/> Everyone free</div>
          <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:12,height:12,borderRadius:2,background:'rgba(226,75,74,.3)'}}/> Someone has class</div>
        </div>
      </>}
      {!results&&!searching&&<div style={{textAlign:'center',padding:'50px 20px',color:'var(--text2)'}}>
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.3" style={{marginBottom:12,opacity:.4}}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <div style={{fontSize:15,fontFamily:'Syne,sans-serif',fontWeight:600,marginBottom:6}}>No results yet</div>
        <div style={{fontSize:13}}>Add people, configure your search window, then hit "Find Free Time"</div>
      </div>}
    </div>
  );
}

function ImageMode({onDone,onCancel}){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [preview,setPreview]=useState('');
  const [parsed,setParsed]=useState([]);
  const [sel,setSel]=useState({});
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef();

  async function process(file){
    if(!file||!file.type.startsWith('image/'))return;
    setLoading(true);setErr('');setParsed([]);setSel({});
    const pr=new FileReader();pr.onload=e=>setPreview(e.target.result);pr.readAsDataURL(file);
    try{
      const slots=await extractScheduleFromImage(file);
      if(!slots.length)throw new Error('empty');
      setParsed(slots);
      setSel(Object.fromEntries(slots.map((_,i)=>[i,true])));
    }catch(e){
      setErr(e.message==='empty'?'No schedule entries found. Try a clearer photo of a timetable.':'Could not read schedule. Try a clearer photo or use manual entry.');
      setPreview('');
    }finally{setLoading(false);}
  }

  const countSel=Object.values(sel).filter(v=>v).length;
  return(
    <div>
      <div className="ai-tag">🤖 Powered by Claude AI — completely free, no API key needed</div>
      {!loading&&!parsed.length&&<>
        {preview&&<img src={preview} className="img-prev" alt="preview"/>}
        <div className={'drop'+(dragOver?' dragover':'')}
          onClick={()=>fileRef.current&&fileRef.current.click()}
          onDragOver={e=>{e.preventDefault();setDragOver(true)}}
          onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);process(e.dataTransfer.files[0])}}>
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" strokeWidth="1.4" style={{marginBottom:10}}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <div style={{fontWeight:500,fontSize:14,marginBottom:4}}>{dragOver?'Drop it!':'Upload routine image'}</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>JPG, PNG, screenshots — drag & drop or click</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>Claude will extract all classes automatically</div>
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>process(e.target.files[0])}/>
        {err&&<div className="warn">{err}</div>}
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:12}}><button className="btn" onClick={onCancel}>Cancel</button></div>
      </>}
      {loading&&<div style={{textAlign:'center',padding:'30px 0'}}>
        {preview&&<img src={preview} className="img-prev" alt="preview"/>}
        <div style={{display:'flex',justifyContent:'center',marginBottom:12}}><span className="spin-g"/></div>
        <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>Claude is reading your schedule…</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>Analyzing the image and extracting time slots</div>
      </div>}
      {parsed.length>0&&<>
        {preview&&<img src={preview} className="img-prev" alt="preview"/>}
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>✅ Found <strong>{parsed.length}</strong> class{parsed.length!==1?'es':''} — deselect any to skip</div>
        <div style={{maxHeight:240,overflowY:'auto',marginBottom:14}}>
          {parsed.map((sl,i)=>(
            <div key={i} className={'psi'+(sel[i]?' on':'')} onClick={()=>setSel(p=>Object.assign({},p,{[i]:!p[i]}))}>
              <div className={'chk'+(sel[i]?' on':'')}>{sel[i]&&<svg width="10" height="10" fill="#fff" viewBox="0 0 16 16"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg>}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sl.label||'Class'}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>{sl.day} · {fmt(sl.startTime)} – {fmt(sl.endTime)}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
          <button className="btn" onClick={()=>{setParsed([]);setPreview('');if(fileRef.current)fileRef.current.value=''}}>Try another</button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn" onClick={onCancel}>Cancel</button>
            <button className="btn pri" disabled={countSel===0} onClick={()=>onDone(parsed.filter((_,i)=>sel[i]))}>Add {countSel} class{countSel!==1?'es':''}</button>
          </div>
        </div>
      </>}
    </div>
  );
}

function GridMode({onSave,onCancel}){
  const [cls,setCls]=useState({day:'Monday',startTime:'09:00',endTime:'11:00',label:''});
  const [drag,setDrag]=useState(null);
  const gridRef=useRef();
  const rows=Array.from({length:28},(_,i)=>i+16);
  return(<>
    <div className="grid-container" ref={gridRef} onMouseUp={()=>setDrag(null)} onMouseLeave={()=>setDrag(null)} style={{marginBottom:14}}>
      <div style={{background:'var(--bg)',position:'sticky',top:0,zIndex:2}}/>
      {DAYS.map(d=><div key={d} className="grid-hd">{d.slice(0,3)}</div>)}
      {rows.map(hh=>{
        const h=Math.floor(hh/2),m=hh%2===0?'00':'30',ts=String(h).padStart(2,'0')+':'+m;
        return(<React.Fragment key={hh}>
          <div className="grid-time" style={{display:'flex',alignItems:'center',justifyContent:'flex-end'}}>{m==='00'?fmt(ts):''}</div>
          {DAYS.map(day=>{
            const ct=toM(ts),nt=ct+30,nss=toM(cls.startTime),nse=toM(cls.endTime);
            const on=cls.day===day&&ct>=nss&&ct<nse;
            let cn="grid-cell";if(on){cn+=" on on-l on-r";if(ct===nss)cn+=" on-top";if(nt===nse)cn+=" on-bot";}
            return(<div key={day+ts} className={cn}
              onMouseDown={()=>{setDrag({day,st:ts});setCls(p=>Object.assign({},p,{day,startTime:ts,endTime:toT(nt)}))}}
              onMouseEnter={e=>{if(e.buttons===1&&drag&&drag.day===day){const s=Math.min(toM(drag.st),ct),en=Math.max(toM(drag.st)+30,nt);setCls(p=>Object.assign({},p,{startTime:toT(s),endTime:toT(en)}))}}}
            />);
          })}
        </React.Fragment>);
      })}
    </div>
    <div style={{display:'flex',gap:10,alignItems:'flex-end',marginBottom:14}}>
      <div style={{flex:1}}><label className="lbl">Selected time</label><div style={{fontSize:13,padding:'8px 11px',background:'var(--bg2)',borderRadius:'var(--r-md)',border:'1px solid var(--border)'}}><strong>{cls.day}</strong>: {fmt(cls.startTime)} – {fmt(cls.endTime)}</div></div>
      <div style={{flex:1}}><label className="lbl">Course name (optional)</label><input placeholder="e.g. Data Structures…" value={cls.label} onChange={e=>setCls(p=>Object.assign({},p,{label:e.target.value}))}/></div>
    </div>
    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
      <button className="btn" onClick={onCancel}>Cancel</button>
      <button className="btn pri" onClick={()=>{if(toM(cls.startTime)<toM(cls.endTime))onSave(cls)}} disabled={toM(cls.startTime)>=toM(cls.endTime)}>Add class</button>
    </div>
  </>);
}

function ManualMode({onSave,onCancel}){
  const [cls,setCls]=useState({day:'Monday',startTime:'09:00',endTime:'11:00',label:''});
  const bad=toM(cls.startTime)>=toM(cls.endTime);
  return(<>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
      <div><label className="lbl">Day</label><select value={cls.day} onChange={e=>setCls(p=>Object.assign({},p,{day:e.target.value}))}>{DAYS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
      <div><label className="lbl">Start</label><TSelect value={cls.startTime} onChange={v=>setCls(p=>Object.assign({},p,{startTime:v}))}/></div>
      <div><label className="lbl">End</label><TSelect value={cls.endTime} onChange={v=>setCls(p=>Object.assign({},p,{endTime:v}))}/></div>
    </div>
    <div style={{marginBottom:14}}><label className="lbl">Course name (optional)</label><input placeholder="e.g. Data Structures, CSE-301…" value={cls.label} onChange={e=>setCls(p=>Object.assign({},p,{label:e.target.value}))}/></div>
    {bad&&<div className="warn" style={{marginBottom:12}}>End time must be after start time</div>}
    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
      <button className="btn" onClick={onCancel}>Cancel</button>
      <button className="btn pri" onClick={()=>onSave(cls)} disabled={bad}>Add class</button>
    </div>
  </>);
}

function App(){
  const [tab,setTab]=useState('people');
  const [people,setPeople]=useState([]);
  const [cfg,setCfg]=useState({startTime:'08:00',endTime:'20:00',selectedDays:['Sunday','Monday','Tuesday','Wednesday','Thursday'],excludedSlots:[]});
  const [results,setResults]=useState(null);
  const [searching,setSearching]=useState(false);
  const [addPersonOpen,setAddPersonOpen]=useState(false);
  const [newName,setNewName]=useState('');
  const [modal,setModal]=useState(null);
  const [newExcl,setNewExcl]=useState({day:'All Days',startTime:'12:30',endTime:'13:30'});

  const totalSearch=toM(cfg.endTime)-toM(cfg.startTime);
  const totalFree=results?cfg.selectedDays.reduce((s,d)=>s+(results[d]?results[d].free.reduce((a,f)=>a+f.e-f.s,0):0),0):0;
  const daysWithFree=results?cfg.selectedDays.filter(d=>results[d]&&results[d].free.length>0).length:0;

  useEffect(()=>{
    if(results&&people.length>0&&cfg.selectedDays.length>0)setResults(computeFree(people,cfg));
    else if(results&&(people.length===0||cfg.selectedDays.length===0)){setResults(null);setTab('people');}
  },[people,cfg]);

  function addPerson(){if(!newName.trim())return;const c=COLORS[people.length%COLORS.length];setPeople(p=>[...p,{id:uid(),name:newName.trim(),color:c,schedule:[]}]);setNewName('');setAddPersonOpen(false);}
  function removePerson(id){setPeople(p=>p.filter(x=>x.id!==id));}
  function removeSlot(pid,idx){setPeople(p=>p.map(x=>x.id===pid?Object.assign({},x,{schedule:x.schedule.filter((_,i)=>i!==idx)}):x));}
  function runSearch(){if(!people.length||!cfg.selectedDays.length)return;setSearching(true);setTimeout(()=>{setResults(computeFree(people,cfg));setSearching(false);setTab('results');},350);}
  function openModal(pid,mode){setModal({pid,mode});}
  function closeModal(){setModal(null);}
  function saveClass(cls){if(!modal)return;setPeople(p=>p.map(x=>x.id===modal.pid?Object.assign({},x,{schedule:[...x.schedule,Object.assign({},cls,{id:uid()})]}):x));closeModal();}
  function saveClasses(arr){if(!modal)return;setPeople(p=>p.map(x=>x.id===modal.pid?Object.assign({},x,{schedule:[...x.schedule,...arr.map(s=>Object.assign({},s,{id:uid()}))]}):x));closeModal();}

  const activePerson=modal&&people.find(p=>p.id===modal.pid);

  return(
    <div className="app">
      <div className="hdr">
        <div>
          <div className="logo">Schedule<em>Sync</em></div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Find common free time across multiple class schedules</div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          {people.length>0&&<div style={{display:'flex'}}>{people.map((p,i)=><div key={p.id} title={p.name} style={{width:30,height:30,borderRadius:'50%',background:p.color.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',border:'2px solid var(--bg)',marginLeft:i>0?-8:0,zIndex:people.length-i}}>{ini(p.name)}</div>)}</div>}
          <button className="btn pri" onClick={runSearch} disabled={searching||!people.length||!cfg.selectedDays.length} style={{fontSize:13}}>
            {searching?React.createElement(React.Fragment,null,React.createElement('span',{className:'spin'}),' Searching…'):'⚡ Find Free Time'}
          </button>
        </div>
      </div>
      <div className="tabs">
        {[
          {id:'people',label:'People'+(people.length>0?' ('+people.length+')':'')},
          {id:'config',label:'Search Settings'},
          {id:'results',label:results?'Results — '+daysWithFree+' day'+(daysWithFree!==1?'s':'')+' free':'Results'}
        ].map(t=><button key={t.id} className={'tab'+(tab===t.id?' on':'')} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>
      <div className="body">
        {tab==='people'&&<>
          {people.length===0?(
            <div style={{textAlign:'center',padding:'50px 20px'}}>
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" strokeWidth="1.2" style={{marginBottom:14}}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:600,marginBottom:8}}>No one here yet</div>
              <div style={{fontSize:13,color:'var(--text2)',marginBottom:20,maxWidth:320,margin:'0 auto 20px'}}>Add everyone whose schedule you want to compare. Upload a photo — AI extracts it instantly, free.</div>
              <button className="btn pri" onClick={()=>setAddPersonOpen(true)}>+ Add first person</button>
            </div>
          ):(
            <>
              <div style={{display:'grid',gap:10,marginBottom:10}}>
                {people.map(person=>(
                  <PersonCard key={person.id} person={person}
                    onRemove={()=>removePerson(person.id)}
                    onRemoveSlot={i=>removeSlot(person.id,i)}
                    onAddClass={mode=>openModal(person.id,mode)}/>
                ))}
              </div>
              <button className="btn" style={{width:'100%',padding:11,justifyContent:'center'}} onClick={()=>setAddPersonOpen(true)}>+ Add another person</button>
            </>
          )}
        </>}
        {tab==='config'&&<ConfigTab cfg={cfg} setCfg={setCfg} newExcl={newExcl} setNewExcl={setNewExcl}/>}
        {tab==='results'&&<ResultsTab people={people} cfg={cfg} results={results} searching={searching} onSearch={runSearch} totalFree={totalFree} totalSearch={totalSearch} daysWithFree={daysWithFree}/>}
      </div>

      {addPersonOpen&&(
        <div className="ov" onClick={()=>setAddPersonOpen(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div className="sec" style={{margin:0}}>Add person</div>
              <button className="btn" style={{padding:'3px 8px'}} onClick={()=>setAddPersonOpen(false)}>✕</button>
            </div>
            <label className="lbl">Name</label>
            <input style={{marginBottom:14}} placeholder="e.g. Tasnia, Adri, Rafi…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addPerson()} autoFocus/>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setAddPersonOpen(false)}>Cancel</button>
              <button className="btn pri" onClick={addPerson} disabled={!newName.trim()}>Add person</button>
            </div>
          </div>
        </div>
      )}

      {modal&&activePerson&&(
        <div className="ov" onClick={closeModal}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div className="sec" style={{margin:0}}>Add class · <span style={{color:activePerson.color.bg}}>{activePerson.name}</span></div>
              <button className="btn" style={{padding:'3px 8px'}} onClick={closeModal}>✕</button>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              {[{id:'manual',label:'✏️ Manual'},{id:'image',label:'🤖 AI Scan'},{id:'grid',label:'📅 Grid'}].map(m=>(
                <button key={m.id} className={'mode-btn'+(modal.mode===m.id?' on':'')} onClick={()=>setModal(p=>Object.assign({},p,{mode:m.id}))}>{m.label}</button>
              ))}
            </div>
            {modal.mode==='manual'&&<ManualMode onSave={cls=>saveClass(cls)} onCancel={closeModal}/>}
            {modal.mode==='image'&&<ImageMode onDone={arr=>saveClasses(arr)} onCancel={closeModal}/>}
            {modal.mode==='grid'&&<GridMode onSave={cls=>saveClass(cls)} onCancel={closeModal}/>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
